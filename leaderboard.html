<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiny Home Project — Leaderboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Coiny&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#f8f3e7',
            mint: '#9fe8d5',
            teal: '#026a61',
            tealDeep: '#014b45',
            coral: '#f4b3a7',
            coralDeep: '#a3453a',
            butter: '#efe45b',
            ink: '#2a2927',
            sand: '#ece2cf',
            fog: '#fffdf8',
            sage: '#dcece6'
          },
          fontFamily: {
            display: ['Coiny', 'cursive'],
            body: ['Plus Jakarta Sans', 'sans-serif']
          },
          boxShadow: {
            card: '0 26px 70px rgba(18, 48, 44, 0.14)',
            soft: '0 14px 34px rgba(0,0,0,0.12)',
            button: '0 14px 30px rgba(2, 106, 97, 0.28)'
          },
          borderRadius: {
            '4xl': '2rem',
            '5xl': '2.75rem'
          }
        }
      }
    };
  </script>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background:
        radial-gradient(circle at 15% 16%, rgba(159, 232, 213, 0.24), transparent 18%),
        radial-gradient(circle at 84% 18%, rgba(239, 228, 91, 0.20), transparent 18%),
        radial-gradient(circle at 86% 72%, rgba(244, 179, 167, 0.22), transparent 20%),
        linear-gradient(180deg, rgba(248, 243, 231, 0.96) 0%, rgba(244, 179, 167, 0.14) 48%, rgba(159, 232, 213, 0.24) 100%);
      min-height: 100vh;
      color: #2a2927;
    }

    .display-font {
      font-family: 'Coiny', cursive;
      line-height: 0.94;
      letter-spacing: 0.02em;
    }

    .groovy-shadow {
      text-shadow: 0 6px 0 rgba(2, 106, 97, 0.12), 0 12px 26px rgba(2, 106, 97, 0.1);
    }

    .board-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 6% 8%, rgba(159, 232, 213, 0.18), transparent 24%),
        radial-gradient(circle at 94% 92%, rgba(244, 179, 167, 0.18), transparent 24%);
      pointer-events: none;
      z-index: 0;
    }

    .board-toggle {
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease, color 180ms ease;
    }

    .board-toggle:hover {
      transform: translateY(-1px);
    }

    .board-toggle.is-active {
      background: #026a61;
      color: white;
      box-shadow: 0 14px 30px rgba(2, 106, 97, 0.22);
    }

    .leader-row {
      position: relative;
      overflow: hidden;
      transition: transform 200ms ease, box-shadow 200ms ease, border-color 200ms ease;
    }

    .leader-row:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 38px rgba(0,0,0,0.11);
    }

    .leader-row.is-top {
      border-color: rgba(2, 106, 97, 0.28);
      box-shadow: 0 18px 40px rgba(2, 106, 97, 0.14);
    }

    .leader-row::after {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 10px;
      background: var(--accent, #026a61);
    }

    .emblem {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25), 0 10px 24px rgba(0,0,0,0.08);
      background: linear-gradient(145deg, var(--accent-soft, #9fe8d5), var(--accent, #026a61));
      color: white;
    }

    .emblem::before,
    .emblem::after {
      content: '';
      position: absolute;
      border-radius: 999px;
      opacity: 0.28;
    }

    .emblem::before {
      width: 72%;
      height: 72%;
      top: -10%;
      right: -8%;
      background: rgba(255,255,255,0.34);
    }

    .emblem::after {
      width: 46%;
      height: 46%;
      bottom: 8%;
      left: 10%;
      background: rgba(255,255,255,0.18);
    }

    .score-number {
      font-variant-numeric: tabular-nums;
    }

    .score-bar {
      position: relative;
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(2, 106, 97, 0.08);
    }

    .score-bar > span {
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--bar, 50%);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent-soft, #9fe8d5), var(--accent, #026a61));
    }

    .fade-up {
      animation: fadeUp 380ms ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body class="text-ink">
  <div class="board-shell relative min-h-screen">
    <div class="relative z-10 mx-auto max-w-7xl px-5 pb-14 pt-6 sm:px-8 lg:px-10">
      <header class="mb-8">
        <div class="flex flex-wrap items-center justify-between gap-4 rounded-[2rem] border border-white/80 bg-white/70 px-5 py-4 shadow-soft backdrop-blur md:px-7">
          <a href="teacher-login.html" class="display-font text-xl text-teal sm:text-2xl">Tiny Home Project</a>
          <nav class="flex items-center gap-3 text-sm font-extrabold uppercase tracking-[0.24em] text-ink/48">
            <a href="collection.html" class="rounded-full px-4 py-2 transition hover:text-teal">Collection</a>
            <a href="leaderboard.html" class="rounded-full border border-teal/16 bg-teal/10 px-4 py-2 text-teal">Leaderboard</a>
          </nav>
        </div>
      </header>

      <section class="mb-8 grid gap-6 lg:grid-cols-[minmax(0,1fr)_auto] lg:items-end">
        <div>
          <div class="display-font groovy-shadow text-[3rem] text-teal sm:text-[4.25rem] lg:text-[5.5rem]">House</div>
          <div class="display-font text-[2.8rem] text-coralDeep sm:text-[4rem] lg:text-[5.2rem]">Leaderboard</div>
        </div>

        <div class="flex flex-wrap items-center gap-3 rounded-[2rem] border border-white/80 bg-white/70 p-2 shadow-soft backdrop-blur">
          <button id="teacherToggle" class="board-toggle rounded-full px-5 py-3 text-sm font-extrabold uppercase tracking-[0.2em] text-teal">Teachers</button>
          <button id="studentToggle" class="board-toggle rounded-full px-5 py-3 text-sm font-extrabold uppercase tracking-[0.2em] text-teal">Students</button>
        </div>
      </section>

      <section class="mb-8 grid gap-4 md:grid-cols-3">
        <div class="rounded-[2rem] border border-white/80 bg-white/72 px-5 py-5 shadow-soft backdrop-blur">
          <div class="text-[11px] font-extrabold uppercase tracking-[0.28em] text-ink/46">Board</div>
          <div id="boardName" class="display-font mt-3 text-3xl text-teal">Teachers</div>
        </div>
        <div class="rounded-[2rem] border border-white/80 bg-white/72 px-5 py-5 shadow-soft backdrop-blur">
          <div class="text-[11px] font-extrabold uppercase tracking-[0.28em] text-ink/46">Houses</div>
          <div id="houseCount" class="display-font mt-3 text-3xl text-coralDeep">26</div>
        </div>
        <div class="rounded-[2rem] border border-white/80 bg-white/72 px-5 py-5 shadow-soft backdrop-blur">
          <div class="text-[11px] font-extrabold uppercase tracking-[0.28em] text-ink/46">Votes</div>
          <div id="boardVotes" class="display-font mt-3 text-3xl text-teal">0</div>
        </div>
      </section>

      <section class="space-y-4" id="leaderboardList"></section>
    </div>
  </div>

  <script>
    const groups = [{"id": 61501, "groupId": 61501, "className": "61B", "animal": "Penguin", "members": ["Isabella", "Kimberley", "Charles", "Noah"]}, {"id": 61502, "groupId": 61502, "className": "61B", "animal": "Bear", "members": ["Jiaran", "Sindy", "Nora", "Iris"]}, {"id": 61503, "groupId": 61503, "className": "61B", "animal": "Rhino", "members": ["Jayden", "Simon", "Kelly", "Cerina"]}, {"id": 61504, "groupId": 61504, "className": "61B", "animal": "Kangaroo", "members": ["Annie", "Teresa", "Ripple", "Elena"]}, {"id": 61505, "groupId": 61505, "className": "61B", "animal": "Wolf", "members": ["Chloe", "Kerry", "Anka", "Suri"]}, {"id": 61506, "groupId": 61506, "className": "61B", "animal": "Hippo", "members": ["Timothy", "Catherine", "Austin"]}, {"id": 62501, "groupId": 62501, "className": "62B", "animal": "Owl", "members": ["Alex", "Derrick", "Johan"]}, {"id": 62502, "groupId": 62502, "className": "62B", "animal": "Dolphin", "members": ["Elsa", "Evelyn", "Owen", "Ling"]}, {"id": 62503, "groupId": 62503, "className": "62B", "animal": "Turtle", "members": ["William", "Daniel", "Austin"]}, {"id": 62504, "groupId": 62504, "className": "62B", "animal": "Fox", "members": ["Jerry", "Cleo", "Hans", "Ivan"]}, {"id": 62505, "groupId": 62505, "className": "62B", "animal": "Panda", "members": ["Anna", "Ela", "Jasmine", "Poppy"]}, {"id": 62506, "groupId": 62506, "className": "62B", "animal": "Giraffe", "members": ["Jeffery", "Max", "Jethro", "Veronica"]}, {"id": 63501, "groupId": 63501, "className": "63B", "animal": "Shark", "members": ["Jason", "Bryan", "Nina", "Noe"]}, {"id": 63502, "groupId": 63502, "className": "63B", "animal": "Koala", "members": ["Hope", "Ethan", "Matthew", "Remy"]}, {"id": 63503, "groupId": 63503, "className": "63B", "animal": "Falcon", "members": ["Kimi", "Ryan", "Quintas", "Selene"]}, {"id": 63504, "groupId": 63504, "className": "63B", "animal": "Tiger", "members": ["Hugh", "Angel", "Felix", "Jeremiah"]}, {"id": 63505, "groupId": 63505, "className": "63B", "animal": "Otter", "members": ["Lucy", "Lucas", "Nate", "Icey"]}, {"id": 63506, "groupId": 63506, "className": "63B", "animal": "Cheetah", "members": ["Luka", "Miranda", "Steven"]}, {"id": 63507, "groupId": 63507, "className": "63B", "animal": "Zebra", "members": ["Henry", "Charlotte", "David"]}, {"id": 64501, "groupId": 64501, "className": "64B", "animal": "Lion", "members": ["Angela", "Rio", "Ethan", "Calinda"]}, {"id": 64502, "groupId": 64502, "className": "64B", "animal": "Seal", "members": ["Yuling", "Hugo", "Glory", "William"]}, {"id": 64503, "groupId": 64503, "className": "64B", "animal": "Octopus", "members": ["Jcee", "Elizabeth", "Arthur", "Ryan"]}, {"id": 64504, "groupId": 64504, "className": "64B", "animal": "Eagle", "members": ["Oscar", "Jonathan", "Evelyn", "Alan"]}, {"id": 64505, "groupId": 64505, "className": "64B", "animal": "Leopard", "members": ["Tara", "Matthew", "Evan"]}, {"id": 64506, "groupId": 64506, "className": "64B", "animal": "Flamingo", "members": ["Nina", "Charles", "Austin"]}, {"id": 64507, "groupId": 64507, "className": "64B", "animal": "Elephant", "members": ["Jovin", "Jasper", "Ari"]}];

    const palette = [
      { accent: '#026a61', soft: '#9fe8d5', text: '#026a61' },
      { accent: '#a3453a', soft: '#f4b3a7', text: '#a3453a' },
      { accent: '#886c00', soft: '#efe45b', text: '#6a5400' },
      { accent: '#3f7f73', soft: '#cfe8df', text: '#2f6c61' },
      { accent: '#7058b7', soft: '#dccdf8', text: '#5f49a8' },
      { accent: '#2f6fa8', soft: '#cde4fb', text: '#255c8d' }
    ];

    function safeParse(json, fallback) {
      try {
        return JSON.parse(json);
      } catch (error) {
        return fallback;
      }
    }

    function hashNumber(value) {
      let hash = 0;
      const string = String(value);
      for (let i = 0; i < string.length; i += 1) {
        hash = ((hash << 5) - hash) + string.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    function colorForGroup(group) {
      return palette[hashNumber(group.animal) % palette.length];
    }

    function initialsForAnimal(animal) {
      const parts = animal.split(/\s+/).filter(Boolean);
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    function progressBarWidth(rating, minRating, maxRating) {
      if (maxRating === minRating) return 50;
      const pct = ((rating - minRating) / (maxRating - minRating)) * 100;
      return Math.max(12, Math.min(100, pct));
    }

    function initialRatings() {
      const initial = {};
      groups.forEach((group) => {
        initial[group.groupId] = { rating: 1500, wins: 0, losses: 0, comparisons: 0 };
      });
      return initial;
    }

    function loadBoardRatings(boardType) {
      const key = `thp_rankings::${boardType}`;
      return safeParse(localStorage.getItem(key), initialRatings()) || initialRatings();
    }

    function totalVotesForBoard(ratings) {
      const totalComparisons = Object.values(ratings).reduce((sum, entry) => sum + (Number(entry.comparisons) || 0), 0);
      return Math.round(totalComparisons / 2);
    }

    function scoreFromRating(rating) {
      const score = 50 + ((rating - 1500) / 5);
      return Math.max(0, Math.min(100, score));
    }

    function buildRows(boardType) {
      const ratings = loadBoardRatings(boardType);
      const rows = groups.map((group) => {
        const stats = ratings[group.groupId] || { rating: 1500, wins: 0, losses: 0, comparisons: 0 };
        return {
          ...group,
          rating: Number(stats.rating) || 1500,
          wins: Number(stats.wins) || 0,
          losses: Number(stats.losses) || 0,
          comparisons: Number(stats.comparisons) || 0,
          score: scoreFromRating(Number(stats.rating) || 1500)
        };
      }).sort((a, b) => {
        if (b.rating !== a.rating) return b.rating - a.rating;
        if (b.wins !== a.wins) return b.wins - a.wins;
        if (b.comparisons !== a.comparisons) return b.comparisons - a.comparisons;
        return a.animal.localeCompare(b.animal);
      });

      return { rows, ratings };
    }

    const listEl = document.getElementById('leaderboardList');
    const boardNameEl = document.getElementById('boardName');
    const houseCountEl = document.getElementById('houseCount');
    const boardVotesEl = document.getElementById('boardVotes');
    const teacherToggle = document.getElementById('teacherToggle');
    const studentToggle = document.getElementById('studentToggle');

    let currentBoard = 'teacher';

    const sessionVoter = safeParse(sessionStorage.getItem('thp_voter'), null);
    if (sessionVoter && sessionVoter.voterType === 'student') {
      currentBoard = 'student';
    }

    function renderBoard() {
      const { rows, ratings } = buildRows(currentBoard);
      const minRating = Math.min(...rows.map((row) => row.rating));
      const maxRating = Math.max(...rows.map((row) => row.rating));

      boardNameEl.textContent = currentBoard === 'teacher' ? 'Teachers' : 'Students';
      houseCountEl.textContent = rows.length;
      boardVotesEl.textContent = totalVotesForBoard(ratings);

      teacherToggle.classList.toggle('is-active', currentBoard === 'teacher');
      studentToggle.classList.toggle('is-active', currentBoard === 'student');

      listEl.innerHTML = rows.map((row, index) => {
        const colors = colorForGroup(row);
        const rank = index + 1;
        const provisional = row.comparisons < 8;
        const bar = progressBarWidth(row.rating, minRating, maxRating);
        const score = row.score.toFixed(1);
        const members = row.members.join(' • ');

        return `
          <article class="leader-row fade-up rounded-[2rem] border border-white/80 bg-white/78 px-4 py-4 shadow-soft backdrop-blur sm:px-5 sm:py-5 ${rank === 1 ? 'is-top' : ''}" style="--accent:${colors.accent};--accent-soft:${colors.soft};animation-delay:${index * 32}ms;">
            <div class="grid gap-4 sm:grid-cols-[auto_auto_minmax(0,1fr)_auto] sm:items-center">
              <div class="flex items-center justify-center">
                <div class="display-font flex h-14 w-14 items-center justify-center rounded-full bg-sand text-2xl sm:h-16 sm:w-16 sm:text-[1.75rem]" style="color:${colors.text};">#${rank}</div>
              </div>

              <div class="emblem flex h-16 w-16 items-center justify-center rounded-[1.25rem] text-xl font-extrabold uppercase tracking-[0.08em] sm:h-20 sm:w-20 sm:text-2xl">
                <span class="relative z-10">${initialsForAnimal(row.animal)}</span>
              </div>

              <div class="min-w-0">
                <div class="flex flex-wrap items-center gap-2">
                  <h2 class="display-font truncate text-[1.65rem] text-ink sm:text-[2rem]">${row.animal}</h2>
                  <span class="rounded-full px-3 py-1 text-[10px] font-extrabold uppercase tracking-[0.22em]" style="background:${colors.soft};color:${colors.text};">${row.className}</span>
                  ${provisional ? '<span class="rounded-full border border-ink/10 bg-sand/70 px-3 py-1 text-[10px] font-extrabold uppercase tracking-[0.22em] text-ink/60">Provisional</span>' : ''}
                </div>
                <div class="mt-1 text-sm font-semibold text-ink/70 sm:text-[15px]">${members}</div>
                <div class="mt-3 flex flex-wrap items-center gap-3 text-[11px] font-extrabold uppercase tracking-[0.2em] text-ink/48">
                  <span>${row.wins} W</span>
                  <span>${row.losses} L</span>
                  <span>${row.comparisons} Matchups</span>
                </div>
                <div class="mt-3 score-bar">
                  <span style="--bar:${bar}%;"></span>
                </div>
              </div>

              <div class="text-right">
                <div class="score-number display-font text-[2.4rem] text-teal sm:text-[3rem]" style="color:${colors.text};">${score}</div>
                <div class="text-[10px] font-extrabold uppercase tracking-[0.22em] text-ink/44">House Score</div>
                <div class="mt-2 text-sm font-bold text-ink/62">ELO ${Math.round(row.rating)}</div>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    teacherToggle.addEventListener('click', () => {
      currentBoard = 'teacher';
      renderBoard();
    });

    studentToggle.addEventListener('click', () => {
      currentBoard = 'student';
      renderBoard();
    });

    renderBoard();
  </script>
</body>
</html>
