      width: 10px;
      background: var(--accent, #026a61);

    .score-number {

      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(2, 106, 97, 0.08);

      position: absolute;
      inset: 0 auto 0 0;
      width: var(--bar, 50%);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent-soft, #9fe8d5), var(--accent, #026a61));

      animation: fadeUp 380ms ease both;
    }

      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

3B", "animal": "Otter", "members": ["Lucy", "Lucas", "Nate", "Icey"]}, {"id": 63506, "groupId": 63506, "className": "63B", "animal": "Cheetah", "members": ["Luka", "Miranda", "Steven"]}, {"id": 63507, "groupId": 63507, "className": "63B", "animal": "Zebra", "members": ["Henry", "Charlotte", "David"]}, {"id": 64501, "groupId": 64501, "className": "64B", "animal": "Lion", "members": ["Angela", "Rio", "Ethan", "Calinda"]}, {"id": 64502, "groupId": 64502, "className": "64B", "animal": "Seal", "members": ["Yuling", "Hugo", "Glory", "William"]}, {"id": 64503, "groupId": 64503, "className": "64B", "animal": "Octopus", "members": ["Jcee", "Elizabeth", "Arthur", "Ryan"]}, {"id": 64504, "groupId": 64504, "className": "64B", "animal": "Eagle", "members": ["Oscar", "Jonathan", "Evelyn", "Alan"]}, {"id": 64505, "groupId": 64505, "className": "64B", "animal": "Leopard", "members": ["Tara", "Matthew", "Evan"]}, {"id": 64506, "groupId": 64506, "className": "64B", "animal": "Flamingo", "members": ["Nina", "Charles", "Austin"]}, {"id": 64507, "groupId": 64507, "className": "64B", "animal": "Elephant", "members": ["Jovin", "Jasper", "Ari"]}];

    const palette = [
      { accent: '#026a61', soft: '#9fe8d5', text: '#026a61' },
      { accent: '#a3453a', soft: '#f4b3a7', text: '#a3453a' },

    function safeParse(json, fallback) {
      try {
        return JSON.parse(json);
      } catch (error) {
        return fallback;
      }
    }

    function hasAnonKey() {
      return Boolean(SUPABASE_ANON_KEY && SUPABASE_ANON_KEY.trim().length > 20 && !SUPABASE_ANON_KEY.includes('PASTE_YOUR'));
    }

    function apiHeaders() {
      return {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`
      };
    }

    function hashNumber(value) {
      let hash = 0;
      const string = String(value);
      for (let i = 0; i < string.length; i += 1) {
        hash = ((hash << 5) - hash) + string.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    function colorForGroup(group) {
      return palette[hashNumber(group.animal) % palette.length];
    }

    function initialsForAnimal(animal) {
      const parts = animal.split(/\s+/).filter(Boolean);
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    const ICON_BASE = 'assets/icons';
    const animalIconMap = {
      Bear: 'bear.png',
      Cheetah: 'cheetah.png',
      Dolphin: 'dolphin.png',
      Eagle: 'eagle.png',
      Elephant: 'elephant.png',

      Flamingo: 'flamingo.png',
      Fox: 'fox.png',

      Kangaroo: 'kangaroo.png',

      Leopard: 'leopard.png',

      Shark: 'shark.png',
      Tiger: 'tiger.png',
      Turtle: 'turtle.png',
      Wolf: 'wolf.png',

    };

    function getIconUrl(row) {
      const filename = row.logoFilename || animalIconMap[row.animal];
      return filename ? `${ICON_BASE}/${filename}` : '';
    }

    function progressBarWidth(rating, minRating, maxRating) {
      if (maxRating === minRating) return 50;
      const pct = ((rating - minRating) / (maxRating - minRating)) * 100;
      return Math.max(12, Math.min(100, pct));
    }

    function scoreFromRating(rating) {
      const score = 50 + ((rating - 1500) / 5);
      return Math.max(0, Math.min(100, score));
    }

    const groupMap = new Map(groups.map(group => [Number(group.groupId), group]));

    function fallbackBoardProfiles() {
      return groups.map(group => ({
        ...group,
        logoFilename: animalIconMap[group.animal] || '',
        teacherRating: 1500,
        studentRating: 1500,
        teacherMatchups: 0,
        studentMatchups: 0
      }));
    }

    async function fetchGroupProfiles() {
      if (!hasAnonKey()) {
        return fallbackBoardProfiles();
      }

      const url = new URL(`${SUPABASE_REST_BASE}/thp_group_profiles`);
      url.searchParams.set('select', 'groupid,animal_name,logo_filename,teacher_elo,student_elo,teacher_votes_count,student_votes_count,active');
      url.searchParams.set('active', 'eq.true');
      url.searchParams.set('order', 'groupid.asc');

      const response = await fetch(url.toString(), { headers: apiHeaders() });
      if (!response.ok) {
        const message = await response.text();
        throw new Error(`Leaderboard fetch failed: ${response.status} ${message}`);
      }

      const profiles = await response.json();

      return profiles.map((profile) => {
        const base = groupMap.get(Number(profile.groupid));
        if (!base) return null;

        return {
          ...base,
          animal: profile.animal_name || base.animal,
          logoFilename: profile.logo_filename || animalIconMap[base.animal] || '',
          teacherRating: Number(profile.teacher_elo) || 1500,
          studentRating: Number(profile.student_elo) || 1500,
          teacherMatchups: Number(profile.teacher_votes_count) || 0,
          studentMatchups: Number(profile.student_votes_count) || 0
        };
      }).filter(Boolean);
    }

    function buildRows(boardType, profiles) {
      return profiles.map((row) => {
        const rating = boardType === 'teacher' ? row.teacherRating : row.studentRating;
        const matchups = boardType === 'teacher' ? row.teacherMatchups : row.studentMatchups;

        return {
          ...row,
          rating,
          matchups,
          score: scoreFromRating(rating)
        };
      }).sort((a, b) => {
        if (b.rating !== a.rating) return b.rating - a.rating;
        if (b.matchups !== a.matchups) return b.matchups - a.matchups;
        return a.animal.localeCompare(b.animal);
      });
    }

    const listEl = document.getElementById('leaderboardList');
    const boardNameEl = document.getElementById('boardName');
    const houseCountEl = document.getElementById('houseCount');
    const boardVotesEl = document.getElementById('boardVotes');
    const teacherToggle = document.getElementById('teacherToggle');
    const studentToggle = document.getElementById('studentToggle');

    const class61Toggle = document.getElementById('class61Toggle');
    const class62Toggle = document.getElementById('class62Toggle');
    const class63Toggle = document.getElementById('class63Toggle');
    const class64Toggle = document.getElementById('class64Toggle');

    let currentBoard = 'teacher';
    let currentClassFilter = 'ALL';
    let boardProfiles = fallbackBoardProfiles();

    const sessionVoter = safeParse(sessionStorage.getItem('thp_voter'), null);
const isStudentViewer = Boolean(sessionVoter && sessionVoter.voterType === 'student');

if (isStudentViewer) {
  currentBoard = 'student';
}

    
    function renderRowInner(row, rank, colors, provisional, bar, score) {
      const members = row.members.join(' • ');
      return `
            <div class="grid gap-4 sm:grid-cols-[auto_auto_minmax(0,1fr)_auto] sm:items-center">
              <div class="flex items-center justify-center">
                <div class="display-font flex h-14 w-14 items-center justify-center rounded-full bg-sand text-2xl sm:h-16 sm:w-16 sm:text-[1.75rem]" style="color:${colors.text};">#${rank}</div>

                <div class="mt-2 text-sm font-bold text-ink/62">ELO ${Math.round(row.rating)}</div>
              </div>
            </div>
      `;
    }

    const rowElements = new Map();
    let lastSignature = '';

    function updateBoardMeta(rows) {
      const boardLabel = currentBoard === 'teacher' ? 'Teachers' : 'Students';
        boardNameEl.textContent = currentClassFilter === 'ALL'
          ? boardLabel
          : `${boardLabel} · ${currentClassFilter}`;
      houseCountEl.textContent = rows.length;

boardVotesEl.textContent = currentClassFilter === 'ALL'
  ? Math.floor(visibleMatchups / 2)

    function signatureForRows(rows) {
      return JSON.stringify(rows.map((row) => [row.groupId, row.rating, row.matchups]));
    }


    function filteredProfiles() {
  if (currentClassFilter === 'ALL') return boardProfiles;
  return boardProfiles.filter((row) => row.className === currentClassFilter);
}

    function renderBoard(force = false) {
    const allRows = buildRows(currentBoard, filteredProfiles());
const rows = isStudentViewer ? allRows.slice(0, 5) : allRows;

      const signature = signatureForRows(rows);
      if (!force && signature === lastSignature) return;
      lastSignature = signature;

      const minRating = Math.min(...rows.map((row) => row.rating));
      const maxRating = Math.max(...rows.map((row) => row.rating));

      const previousPositions = new Map();
      Array.from(listEl.children).forEach((el) => {
        previousPositions.set(el.dataset.groupId, el.getBoundingClientRect().top);
      });

      const activeIds = new Set(rows.map((row) => String(row.groupId)));

      rows.forEach((row, index) => {
        const id = String(row.groupId);
        const colors = colorForGroup(row);
        const rank = index + 1;
        const provisional = row.matchups < 4;
        const bar = progressBarWidth(row.rating, minRating, maxRating);
        const score = row.score.toFixed(1);

        let article = rowElements.get(id);
        const isNew = !article;

        if (!article) {
          article = document.createElement('article');
          article.dataset.groupId = id;
          rowElements.set(id, article);
        }

        article.className = `leader-row rounded-[2rem] border border-white/80 bg-white/78 px-4 py-4 shadow-soft backdrop-blur sm:px-5 sm:py-5 ${rank === 1 ? 'is-top' : ''} ${isNew ? 'is-new' : ''}`;
        article.style.setProperty('--accent', colors.accent);
        article.style.setProperty('--accent-soft', colors.soft);
        article.innerHTML = renderRowInner(row, rank, colors, provisional, bar, score);
        listEl.appendChild(article);
      });

      Array.from(rowElements.keys()).forEach((id) => {
        if (!activeIds.has(id)) {
          const el = rowElements.get(id);
          if (el?.parentNode) el.parentNode.removeChild(el);
          rowElements.delete(id);
        }
      });

      Array.from(listEl.children).forEach((el) => {
        const oldTop = previousPositions.get(el.dataset.groupId);
        const newTop = el.getBoundingClientRect().top;
        if (oldTop !== undefined) {
          const delta = oldTop - newTop;
          if (Math.abs(delta) > 1) {
            el.style.transition = 'none';
            el.style.transform = `translateY(${delta}px)`;
            requestAnimationFrame(() => {
              el.style.transition = '';
              el.style.transform = '';
            });
          }
        } else {
          el.style.opacity = '0';
          el.style.transform = 'translateY(10px)';
          requestAnimationFrame(() => {
            el.style.transition = '';
            el.style.opacity = '1';
            el.style.transform = '';
          });
        }
      });
    }

    async function refreshBoardData(force = false) {
      try {
        boardProfiles = await fetchGroupProfiles();
      } catch (error) {
        console.error(error);
      }
      renderBoard(force);
    }

    teacherToggle.addEventListener('click', () => {
      currentBoard = 'teacher';
      renderBoard(true);
    });

    studentToggle.addEventListener('click', () => {
      currentBoard = 'student';
      renderBoard(true);
    });

    classAllToggle.addEventListener('click', () => {
  currentClassFilter = 'ALL';
  renderBoard(true);
});

class61Toggle.addEventListener('click', () => {
  currentClassFilter = '61B';
  renderBoard(true);
});

class62Toggle.addEventListener('click', () => {
  currentClassFilter = '62B';
  renderBoard(true);
});

class63Toggle.addEventListener('click', () => {
  currentClassFilter = '63B';
  renderBoard(true);
});

class64Toggle.addEventListener('click', () => {
  currentClassFilter = '64B';
  renderBoard(true);
});

    renderBoard(true);
    refreshBoardData(true);
    setInterval(() => refreshBoardData(false), REFRESH_MS);

  </script>
</body>
