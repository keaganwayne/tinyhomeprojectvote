<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiny Home Project — Student Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Coiny&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#f8f3e7',
            mint: '#9fe8d5',
            teal: '#026a61',
            tealDeep: '#014b45',
            coral: '#f4b3a7',
            coralDeep: '#a3453a',
            butter: '#efe45b',
            ink: '#2a2927',
            sand: '#ece2cf',
            fog: '#fffdf8'
          },
          fontFamily: {
            display: ['Coiny', 'cursive'],
            body: ['Plus Jakarta Sans', 'sans-serif']
          },
          boxShadow: {
            card: '0 24px 70px rgba(18, 48, 44, 0.14)',
            float: '0 18px 45px rgba(0, 0, 0, 0.12)',
            button: '0 14px 30px rgba(2, 106, 97, 0.28)'
          },
          borderRadius: {
            '4xl': '2rem',
            '5xl': '2.75rem'
          }
        }
      }
    };
  </script>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background:
        radial-gradient(circle at 18% 20%, rgba(239, 228, 91, 0.30), transparent 18%),
        radial-gradient(circle at 82% 70%, rgba(244, 179, 167, 0.30), transparent 18%),
        linear-gradient(115deg, #d8efe3 0%, #a9ebdb 46%, #f7d4cc 100%);
      min-height: 100vh;
    }

    .floaty-orb {
      animation: drift 8s ease-in-out infinite;
      backdrop-filter: blur(8px);
    }

    .floaty-orb.delay-1 { animation-delay: -2s; }
    .floaty-orb.delay-2 { animation-delay: -4s; }

    .groovy-title,
    .brand-title,
    .cta-title {
      font-family: 'Coiny', cursive;
      letter-spacing: 0.02em;
      line-height: 0.95;
    }

    .groovy-shadow-green {
      text-shadow: 0 6px 0 rgba(2, 106, 97, 0.14), 0 10px 24px rgba(2, 106, 97, 0.16);
    }

    .brand-title {
      text-shadow: 0 4px 0 rgba(2, 106, 97, 0.12);
    }

    .card-glow::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 0% 0%, rgba(159, 232, 213, 0.34), transparent 28%),
        radial-gradient(circle at 100% 100%, rgba(244, 179, 167, 0.28), transparent 28%);
      pointer-events: none;
    }

    .code-input::-webkit-outer-spin-button,
    .code-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .code-input[type='number'] {
      -moz-appearance: textfield;
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(3deg); }
    }
  </style>
</head>
<body class="text-ink">
  <main class="min-h-screen flex items-center justify-center px-4 py-10 sm:px-6">
    <div class="relative w-full max-w-2xl">
      <div class="floaty-orb absolute -left-3 top-20 hidden h-24 w-24 items-center justify-center rounded-full bg-white/32 shadow-float lg:flex">
        <span class="material-symbols-outlined text-coralDeep text-4xl">pin</span>
      </div>
      <div class="floaty-orb delay-1 absolute -right-5 top-36 hidden h-28 w-28 items-center justify-center rounded-full bg-white/30 shadow-float lg:flex">
        <span class="material-symbols-outlined text-teal text-5xl">cottage</span>
      </div>
      <div class="floaty-orb delay-2 absolute -right-2 bottom-10 hidden h-20 w-20 items-center justify-center rounded-full bg-white/28 shadow-float lg:flex">
        <span class="material-symbols-outlined text-butter text-4xl">key</span>
      </div>

      <section class="card-glow relative overflow-hidden rounded-5xl border border-white/60 bg-fog/88 px-6 py-8 shadow-card backdrop-blur-xl sm:px-10 sm:py-10 lg:px-14 lg:py-12">
        <div class="relative z-10">
          <div class="flex items-center justify-between gap-4">
            <p class="brand-title text-2xl text-teal sm:text-3xl">Tiny Home Project</p>
            <span class="rounded-full border border-teal/18 bg-teal/10 px-4 py-2 text-xs font-extrabold uppercase tracking-[0.22em] text-teal">Student Access</span>
          </div>

          <div class="mt-10 text-center sm:mt-12">
            <h1 class="groovy-title groovy-shadow-green text-5xl text-teal sm:text-6xl lg:text-7xl">Enter Your<br> Code</h1>
            <p class="mx-auto mt-5 max-w-xl text-base font-medium leading-7 text-ink/72 sm:text-lg">
              Tiny Home Tracker Code
            </p>
          </div>

          <form id="studentLoginForm" class="mx-auto mt-10 max-w-xl sm:mt-12" novalidate>
            <label for="studentCode" class="mb-3 block text-sm font-extrabold uppercase tracking-[0.22em] text-teal/78">Tracker code</label>

            <div class="relative">
              <span class="material-symbols-outlined pointer-events-none absolute left-5 top-1/2 -translate-y-1/2 text-teal">password</span>
              <input
                id="studentCode"
                class="code-input h-16 w-full rounded-full border-2 border-transparent bg-sand px-14 pr-5 text-center text-2xl font-extrabold tracking-[0.4em] text-ink outline-none transition placeholder:tracking-[0.18em] placeholder:text-ink/35 focus:border-teal focus:bg-white focus:ring-4 focus:ring-teal/10 sm:text-3xl"
                type="text"
                inputmode="numeric"
                autocomplete="one-time-code"
                maxlength="4"
                placeholder="0000"
                aria-describedby="helperText"
              />
            </div>

            <p id="helperText" class="mt-4 min-h-[1.5rem] text-center text-sm font-semibold text-coralDeep"></p>

            <button id="enterButton" type="submit" class="mt-4 flex h-16 w-full items-center justify-center gap-3 rounded-full bg-teal px-8 text-lg font-extrabold uppercase tracking-[0.18em] text-white shadow-button transition hover:-translate-y-0.5 hover:bg-tealDeep active:translate-y-0 active:scale-[0.985] sm:text-xl">
              <span class="cta-title text-xl sm:text-2xl">Enter</span>
              <span class="material-symbols-outlined text-3xl">arrow_forward</span>
            </button>

            <div class="mt-8 flex flex-wrap items-center justify-center gap-3">
              <span class="rounded-full bg-white/72 px-4 py-2 text-xs font-extrabold uppercase tracking-[0.18em] text-teal/78">Tiny Home Project</span>
              <span class="rounded-full bg-white/72 px-4 py-2 text-xs font-extrabold uppercase tracking-[0.18em] text-coralDeep">25 votes max</span>
            </div>
          </form>
        </div>
      </section>
    </div>
  </main>

<script>
  const SUPABASE_URL = 'https://trtwmxdtedqltjvzqdvu.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRydHdteGR0ZWRxbHRqdnpxZHZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NTAwMTMsImV4cCI6MjA4ODIyNjAxM30.xgNPvo3JzKdvbGxRagQ53TUEgfPMkute0vFv70qmK_0';
  const SUPABASE_REST_BASE = `${SUPABASE_URL}/rest/v1`;
  const COLLECTION_PAGE = 'collection.html';

  const form = document.getElementById('studentLoginForm');
  const codeInput = document.getElementById('studentCode');
  const helperText = document.getElementById('helperText');
  const enterButton = document.getElementById('enterButton');

  function hasAnonKey() {
    return Boolean(
      SUPABASE_ANON_KEY &&
      SUPABASE_ANON_KEY.trim().length > 20 &&
      !SUPABASE_ANON_KEY.includes('PASTE_YOUR')
    );
  }

  function apiHeaders(prefer = 'return=representation') {
    return {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      Prefer: prefer
    };
  }

  codeInput.addEventListener('input', () => {
    const digitsOnly = codeInput.value.replace(/\D/g, '').slice(0, 4);
    codeInput.value = digitsOnly;
    if (helperText.textContent) helperText.textContent = '';
  });

  async function findStudentByCode(code) {
    if (!hasAnonKey()) {
      throw new Error('Missing Supabase anon key.');
    }

    const url = new URL(`${SUPABASE_REST_BASE}/students`);
    url.searchParams.set('select', 'StudentID,Name,LoginCode,Active');
    url.searchParams.set('LoginCode', `eq.${code}`);
    url.searchParams.set('Active', 'eq.true');
    url.searchParams.set('limit', '1');

    const response = await fetch(url.toString(), {
      method: 'GET',
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`
      }
    });

    if (!response.ok) {
      const text = await response.text();
      throw new Error(`Student lookup failed: ${text}`);
    }

    const rows = await response.json();
    return rows[0] || null;
  }

  async function createStudentVoteSession(student) {
    const response = await fetch(`${SUPABASE_REST_BASE}/thp_vote_sessions`, {
      method: 'POST',
      headers: apiHeaders('return=representation'),
      body: JSON.stringify({
        voter_type: 'student',
        student_id: Number(student.StudentID),
        max_votes: 25,
        votes_used: 0,
        completed: false
      })
    });

    if (!response.ok) {
      const text = await response.text();
      throw new Error(`Session creation failed: ${text}`);
    }

    const rows = await response.json();
    return rows[0];
  }

  form.addEventListener('submit', async (event) => {
    event.preventDefault();

    const enteredCode = codeInput.value.replace(/\D/g, '').trim();

    if (enteredCode.length !== 4) {
      helperText.textContent = 'Enter your 4-digit tracker code.';
      codeInput.focus();
      return;
    }

    if (!hasAnonKey()) {
      helperText.textContent = 'Add your Supabase anon key first.';
      return;
    }

    enterButton.disabled = true;
    helperText.textContent = 'Checking code...';

    try {
      const student = await findStudentByCode(enteredCode);

      if (!student) {
        helperText.textContent = 'Code not found.';
        enterButton.disabled = false;
        codeInput.focus();
        return;
      }

      const session = await createStudentVoteSession(student);

      sessionStorage.setItem('thp_voter', JSON.stringify({
        voterType: 'student',
        voterId: String(student.StudentID),
        studentId: Number(student.StudentID),
        displayName: student.Name || enteredCode,
        loginCode: enteredCode,
        sessionId: session.id,
        maxVotes: Number(session.max_votes) || 25,
        votesUsed: Number(session.votes_used) || 0,
        completed: Boolean(session.completed),
        loginAt: new Date().toISOString()
      }));

      window.location.href = COLLECTION_PAGE;
    } catch (error) {
      console.error(error);
      helperText.textContent = error.message || 'Could not sign in.';
      enterButton.disabled = false;
    }
  });
</script>
</body>
</html>
