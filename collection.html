    :root {

      --transition-slow: 620ms;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background:

        radial-gradient(circle at 84% 72%, rgba(244, 179, 167, 0.24), transparent 20%),

      overflow-x: hidden;

    .brand-title,
    .groovy-title,
    .button-title,

    .groovy-shadow-green {
      text-shadow: 0 6px 0 rgba(2, 106, 97, 0.16), 0 12px 24px rgba(2, 106, 97, 0.14);
    }

    .battle-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 10% 12%, rgba(159, 232, 213, 0.28), transparent 24%),
        radial-gradient(circle at 90% 86%, rgba(244, 179, 167, 0.20), transparent 22%);
      pointer-events: none;
    }

    .battle-card {
      position: relative;
      transition: transform var(--transition-slow) cubic-bezier(.22,.61,.36,1), opacity var(--transition-slow) ease, box-shadow 260ms ease;
      will-change: transform, opacity;
    }

    .battle-card.is-chosen {
      box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.18), 0 22px 50px rgba(34, 197, 94, 0.22);
    }

    .battle-card.is-dimmed {
      opacity: 0.72;
      transform: scale(0.988);
    }

    .battle-stage.is-animating .battle-card.swipe-left {
      transform: translateX(-125%) rotate(-8deg) scale(0.96);
      opacity: 0;
    }

    .battle-stage.is-animating .battle-card.swipe-right {
      transform: translateX(125%) rotate(8deg) scale(0.96);
      opacity: 0;
    }

    .battle-card.enter-right {
      transform: translateX(120%) scale(0.97);
      opacity: 0;
    }

    .battle-card.enter-left {
      transform: translateX(-120%) scale(0.97);
      opacity: 0;
    }

    .battle-card.enter-reset {
      transform: translateX(0) scale(1);
      opacity: 1;
    }

    .vote-flash {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(34, 197, 94, 0.18), rgba(74, 222, 128, 0.24), rgba(34, 197, 94, 0.18));
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 15;
      filter: blur(2px);
    }

    .vote-flash.active {
      opacity: 1;
      animation: flashFade 700ms ease forwards;
    }

    @keyframes flashFade {
      0% { opacity: 0; }
      20% { opacity: 1; }
      100% { opacity: 0; }
    }

    .scene {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, var(--sky-1) 0%, var(--sky-2) 62%, var(--ground-1) 62%, var(--ground-2) 100%);
      isolation: isolate;
    }

    .scene::before,
    .scene::after {
      content: '';
      position: absolute;
      border-radius: 999px;
      opacity: 0.94;
    }

    .scene::before {
      width: 17%;
      aspect-ratio: 1;
      top: 10%;
      right: 12%;
      background: rgba(255, 236, 155, 0.92);
      box-shadow: 0 0 0 12px rgba(255, 236, 155, 0.14);
    }

    .scene::after {
      width: 28%;
      height: 10%;
      left: 10%;
      top: 14%;
      background: rgba(255,255,255,0.92);
      box-shadow: 18px 8px 0 6px rgba(255,255,255,0.92), 54px 2px 0 2px rgba(255,255,255,0.86);
    }

    .scene .hill,
    .scene .hill-two,
    .scene .hill-three,
    .scene .house,
    .scene .roof,
    .scene .window,
    .scene .walkway,
    .scene .tag,
    .scene .tree,
    .scene .tree::before,
    .scene .tree::after {
      position: absolute;
    }

    .scene .hill {
      width: 52%;
      height: 38%;
      left: -4%;
      bottom: 28%;
      border-radius: 80% 80% 0 0;
      background: var(--hill-1);
    }

    .scene .hill-two {
      width: 46%;
      height: 32%;
      right: 6%;
      bottom: 30%;
      border-radius: 80% 80% 0 0;
      background: var(--hill-2);
    }

    .scene .hill-three {
      width: 100%;
      height: 22%;
      left: 0;
      bottom: 0;
      background: linear-gradient(180deg, var(--ground-1), var(--ground-2));
    }

    .scene .house {
      width: 28%;
      height: 24%;
      left: 50%;
      transform: translateX(-50%);
      bottom: 19%;
      background: rgba(255,255,255,0.94);
      border-radius: 0.9rem;
      box-shadow: 0 10px 18px rgba(0,0,0,0.10);
    }

    .scene .roof {
      width: 34%;
      height: 12%;
      left: 50%;
      transform: translateX(-50%) rotate(-4deg);
      bottom: 39%;
      background: var(--roof);
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    }

    .scene .window {
      width: 7%;
      aspect-ratio: 1;
      bottom: 28%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(159, 232, 213, 0.9);
      border-radius: 0.45rem;
    }

    .scene .walkway {
      width: 22%;
      height: 6%;
      left: 50%;
      transform: translateX(-50%);
      bottom: 13%;
      background: rgba(245, 230, 204, 0.96);
      border-radius: 999px;
      opacity: 0.84;
    }

    .scene .tree {
      width: 4%;
      height: 18%;
      left: 16%;
      bottom: 16%;
      background: #84563d;
      border-radius: 999px;
    }

    .scene .tree::before {
      content: '';
      width: 220%;
      aspect-ratio: 1;
      left: -58%;
      top: -62%;
      background: var(--tree);
      border-radius: 999px;
    }

    .scene .tree::after {
      content: '';
      width: 170%;
      aspect-ratio: 1;
      left: -34%;
      top: -96%;
      background: var(--tree-2);
      border-radius: 999px;
    }

    .video-scene .cloud-run,
    .video-scene .sun-bounce {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .video-scene .cloud-run::before,
    .video-scene .cloud-run::after {
      content: '';
      position: absolute;
      width: 16%;
      height: 8%;
      top: 16%;
      background: rgba(255,255,255,0.9);
      border-radius: 999px;
      filter: drop-shadow(14px 6px 0 rgba(255,255,255,0.9));
      animation: cloudFloat 13s linear infinite;
    }

.boot-overlay {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at 18% 16%, rgba(239, 228, 91, 0.18), transparent 18%),
    radial-gradient(circle at 84% 72%, rgba(244, 179, 167, 0.18), transparent 20%),
    rgba(248, 243, 231, 0.84);
  backdrop-filter: blur(16px);
  opacity: 1;
  pointer-events: auto;
  transition: opacity 280ms ease, visibility 280ms ease;
  visibility: visible;
  z-index: 60;
}

.boot-overlay.is-hidden {
  opacity: 0;
  pointer-events: none;
  visibility: hidden;
}

.boot-card {
  width: min(92vw, 38rem);
  border: 1px solid rgba(255,255,255,0.7);
  background: rgba(255, 253, 248, 0.94);
  border-radius: 2.75rem;
  padding: 2.5rem 2rem;
  text-align: center;
  box-shadow: 0 26px 70px rgba(18, 48, 44, 0.14);
}

.boot-progress {
  width: 100%;
  height: 1rem;
  border-radius: 999px;
  overflow: hidden;
  background: linear-gradient(90deg, rgba(159,232,213,0.32), rgba(244,179,167,0.24));
}

.boot-progress-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #026a61, #1aa88f, #4ade80);
  transition: width 220ms ease;
}

    .video-scene .cloud-run::before { left: -18%; }

    .video-scene .sun-bounce::before {
      content: '';
      position: absolute;
      width: 16%;
      aspect-ratio: 1;
      top: 10%;
      right: 12%;
      border-radius: 999px;
      background: rgba(255, 236, 155, 0.96);

    @keyframes cloudFloat {
      0% { transform: translateX(0); }
      100% { transform: translateX(820%); }

    @keyframes sunPulse {

    .carousel-track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 460ms cubic-bezier(.22,.61,.36,1);
    }

    .carousel-slide {
      min-width: 100%;
      height: 100%;
    }

    .carousel-arrow {
      backdrop-filter: blur(7px);
    }

    .dot {
      transition: transform 180ms ease, background-color 180ms ease, opacity 180ms ease;
    }

    .dot.is-active {
      background-color: rgba(255,255,255,0.96);
      transform: scale(1.2);
      opacity: 1;
    }

    .vs-pulse {
      animation: vsPulse 620ms ease;
    }

    @keyframes vsPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }

    .completion-overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(6, 43, 40, 0.38);
      backdrop-filter: blur(12px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 240ms ease;
      z-index: 50;

    .completion-overlay.is-visible {
      opacity: 1;
      pointer-events: auto;

    .nav-link.active {

      border-bottom-color: rgba(2, 106, 97, 0.7);

async function fetchSessionProgress(voter) {
  const fallback = {
    votesUsed: Number(voter.votesUsed) || 0,
    completed: Boolean(voter.completed),
    maxVotes: Number(voter.maxVotes) || 25
  };

  if (!hasAnonKey() || !voter.sessionId) return fallback;

  const url = `${SUPABASE_REST_BASE}/thp_vote_sessions?id=eq.${encodeURIComponent(voter.sessionId)}&select=id,votes_used,max_votes,completed`;
  const response = await fetch(url, {
    method: 'GET',
    headers: supabaseHeaders('return=representation')
  });

  if (!response.ok) return fallback;

  const rows = await response.json();
  const row = rows?.[0];
  if (!row) return fallback;

  return {
    votesUsed: Number(row.votes_used) || 0,
    completed: Boolean(row.completed),
    maxVotes: Number(row.max_votes) || 25
  };
}

    function safeParse(json, fallback) {

async function preloadInitialPairWithProgress(pair) {
  setBootProgress(6, 'Finding the first matchup...');

  const [leftMedia, rightMedia] = await Promise.all([
    loadMediaForGroup(pair.left),
    loadMediaForGroup(pair.right)
  ]);

  const tasks = [];

  [leftMedia, rightMedia].forEach((media) => {
    if (media.videoUrl) {
      tasks.push(() => preloadVideo(media.videoUrl));
    }
    media.images.forEach((url) => {
      tasks.push(() => preloadImage(url));
    });
  });

  if (!tasks.length) {
    setBootProgress(100, 'Ready');
    return;
  }

  let done = 0;
  const total = tasks.length;

  setBootProgress(12, 'Loading photos and video...');

  await Promise.allSettled(
    tasks.map((task) =>
      task().finally(() => {
        done += 1;
        const percent = 12 + Math.round((done / total) * 88);
        setBootProgress(percent, `Loading ${done} of ${total} assets...`);
      })
    )
  );

  setBootProgress(100, 'Ready');
}

      }
    );

    async function resourceExists(url) {
  try {

    async function loadMediaForGroup(group) {
      if (app.mediaCache[group.groupId]) return app.mediaCache[group.groupId];
      if (app.mediaPromises[group.groupId]) return app.mediaPromises[group.groupId];

      app.mediaPromises[group.groupId] = (async () => {
        const media = {
          folder: groupFolder(group),
          videoUrl: null,
          images: [],
          topDownUrl: null
        };

        const videoUrl = buildVideoUrl(group);
        if (await resourceExists(videoUrl)) {
          media.videoUrl = videoUrl;
        }

        for (let index = 1; index <= MAX_IMAGE_SCAN; index += 1) {
          const imageUrl = buildImageUrl(group, index);
          const exists = await resourceExists(imageUrl);
          if (exists) {
            media.images.push(imageUrl);
          }
        }

        for (const filename of TOP_DOWN_FILENAMES) {
          const topDownUrl = buildTopDownUrl(group, filename);
          if (await resourceExists(topDownUrl)) {
            media.topDownUrl = topDownUrl;
            break;
          }
        }

        app.mediaCache[group.groupId] = media;
        delete app.mediaPromises[group.groupId];
        return media;
      })();

      return app.mediaPromises[group.groupId];
    }

    async function hydratePair(pair) {
      await Promise.all([
        loadMediaForGroup(pair.left),
        loadMediaForGroup(pair.right)
      ]);

    function preloadImage(url) {
      return new Promise((resolve) => {
        let settled = false;
        const finish = (value) => {
          if (settled) return;
          settled = true;
          resolve(value);
        };
        const image = new Image();
        image.onload = () => finish(true);
        image.onerror = () => finish(false);
        image.src = url;
        setTimeout(() => finish(false), 5000);
      });
    }

    function preloadVideo(url) {
      return new Promise((resolve) => {
        if (!url) {
          resolve(false);
          return;
        }
        let settled = false;
        const finish = (value) => {
          if (settled) return;
          settled = true;
          resolve(value);
        };
        const video = document.createElement('video');
        video.preload = 'auto';
        video.muted = true;
        video.playsInline = true;
        video.onloadeddata = () => finish(true);
        video.oncanplaythrough = () => finish(true);
        video.onerror = () => finish(false);
        video.src = url;
        video.load();
        setTimeout(() => finish(false), 6000);
      });
    }

    async function preloadGroupMedia(group) {
      const media = await loadMediaForGroup(group);
      const tasks = [];
      if (media.videoUrl) tasks.push(preloadVideo(media.videoUrl));
      media.images.forEach((imageUrl) => tasks.push(preloadImage(imageUrl)));
      if (media.topDownUrl) tasks.push(preloadImage(media.topDownUrl));
      await Promise.allSettled(tasks);
      return media;
    }

    async function preloadPairMedia(pair) {
      await Promise.all([
        preloadGroupMedia(pair.left),
        preloadGroupMedia(pair.right)
      ]);
      return pair;

    function expectedScore(ratingA, ratingB) {
      return 1 / (1 + Math.pow(10, (ratingB - ratingA) / 400));
    }

    function pairKey(a, b) {
      return [a.groupId, b.groupId].sort((x, y) => x - y).join('::');
    }

    function choosePair({ avoidKeys = new Set(), markSeen = true } = {}) {
      const available = playableGroups.slice();
      if (available.length < 2) {
        throw new Error('At least two uploaded groups are required to build a matchup.');
      }

      for (let attempt = 0; attempt < 40; attempt += 1) {
        const anchor = available[Math.floor(Math.random() * available.length)];
        const anchorRating = app.ratings[anchor.groupId].rating;
        const candidates = available
          .filter((group) => group.groupId !== anchor.groupId)
          .map((group) => {
            const key = pairKey(anchor, group);
            return {
              group,
              key,
              diff: Math.abs(app.ratings[group.groupId].rating - anchorRating),
              seen: app.seenPairs.has(key),
              blocked: avoidKeys.has(key)
            };
          })
          .filter((item) => !item.blocked)
          .sort((a, b) => a.diff - b.diff);

        if (!candidates.length) continue;

        let band;
        const roll = Math.random();
        if (roll < 0.7) band = candidates.slice(0, 6);
        else if (roll < 0.9) band = candidates.slice(6, 14);
        else band = candidates.slice(14);
        if (!band.length) band = candidates;

        const unplayed = band.filter((item) => !item.seen);
        const pickPool = unplayed.length ? unplayed : band;
        if (!pickPool.length) continue;

        const rival = pickPool[Math.floor(Math.random() * pickPool.length)].group;
        if (!rival || rival.groupId === anchor.groupId) continue;

        const leftFirst = Math.random() > 0.5;
        const pair = leftFirst ? { left: anchor, right: rival } : { left: rival, right: anchor };

        if (pair.left.groupId === pair.right.groupId) continue;

        if (markSeen) app.seenPairs.add(pairKey(pair.left, pair.right));
        return pair;
      }

      const fallbackPair = { left: available[0], right: available[1] };
      if (markSeen) app.seenPairs.add(pairKey(fallbackPair.left, fallbackPair.right));
      return fallbackPair;
    }

    function chooseQueuedPair(currentPair = null) {
      const avoidKeys = new Set();
      if (currentPair) avoidKeys.add(pairKey(currentPair.left, currentPair.right));
      if (app.nextPair) avoidKeys.add(pairKey(app.nextPair.left, app.nextPair.right));

      let pair = choosePair({ avoidKeys, markSeen: true });

      if (pair.left.groupId === pair.right.groupId) {
        pair = choosePair({ avoidKeys, markSeen: true });
      }

      return pair;
}

    function queueNextPair(preselectedPair = null) {
      const queuedPair = preselectedPair || chooseQueuedPair(app.currentPair);
      app.nextPair = queuedPair;
      app.nextPairReady = false;
      app.preloadPromise = preloadPairMedia(queuedPair)
        .then(() => {
          if (app.nextPair && pairKey(app.nextPair.left, app.nextPair.right) === pairKey(queuedPair.left, queuedPair.right)) {
            app.nextPairReady = true;
          }
          return queuedPair;
        })
        .catch(() => queuedPair);
      return app.preloadPromise;
    }

    function updateDots(side, activeIndex) {
      document.querySelectorAll(`[data-dot-side="${side}"]`).forEach((dot, idx) => {
        dot.classList.toggle('is-active', idx === activeIndex);
      });
    }

    function jumpTrackWithoutAnimation(track, displayIndex) {
      if (!track) return;
      const previousTransition = track.style.transition;
      track.style.transition = 'none';
      track.style.transform = `translateX(-${displayIndex * 100}%)`;
      void track.offsetHeight;
      track.style.transition = previousTransition || '';
    }

    function moveCarousel(side, direction, manual = false) {
      const state = app.carousel[side];
      const total = Math.max(Number(state.total) || 1, 1);
      if (total <= 1) return;
      if (manual) state.manual = true;
      const track = document.getElementById(`${side}Track`);
      if (!track) return;
      const previousIndex = state.index;
      const nextIndex = (previousIndex + direction + total) % total;
      state.index = nextIndex;
      updateDots(side, nextIndex);

      if (direction > 0 && previousIndex === total - 1) {
        track.style.transform = `translateX(-${(total + 1) * 100}%)`;
        const handleWrap = () => {
          track.removeEventListener('transitionend', handleWrap);
          jumpTrackWithoutAnimation(track, 1);
        };
        track.addEventListener('transitionend', handleWrap, { once: true });
        return;
      }

      if (direction < 0 && previousIndex === 0) {
        track.style.transform = 'translateX(0%)';
        const handleWrap = () => {
          track.removeEventListener('transitionend', handleWrap);
          jumpTrackWithoutAnimation(track, total);
        };
        track.addEventListener('transitionend', handleWrap, { once: true });
        return;
      }

      track.style.transform = `translateX(-${(nextIndex + 1) * 100}%)`;
    }

    function setCarousel(side, index) {
      const state = app.carousel[side];
      const total = Math.max(Number(state.total) || 1, 1);
      state.manual = true;
      state.index = Math.max(0, Math.min(index, total - 1));
      const track = document.getElementById(`${side}Track`);
      if (track) track.style.transform = `translateX(-${(state.index + (total > 1 ? 1 : 0)) * 100}%)`;
      updateDots(side, state.index);
    }

    function setTopDown(side, open) {
      app.topDownOpen[side] = Boolean(open);
      const overlay = document.querySelector(`[data-topdown-overlay="${side}"]`);
      if (!overlay) return;
      overlay.classList.toggle('hidden', !open);
    }

    function bindCardEvents() {
      document.querySelectorAll('.vote-button').forEach((button) => {
        button.addEventListener('click', () => castVote(button.dataset.side));
      });

      document.querySelectorAll('[data-carousel]').forEach((button) => {
        button.addEventListener('click', () => moveCarousel(button.dataset.carousel, Number(button.dataset.dir), true));
      });

      document.querySelectorAll('[data-dot-side]').forEach((button) => {
        button.addEventListener('click', () => setCarousel(button.dataset.dotSide, Number(button.dataset.dotIndex)));
      });

      document.querySelectorAll('[data-topdown-toggle]').forEach((button) => {
        button.addEventListener('click', () => setTopDown(button.dataset.topdownToggle, true));
      });

      document.querySelectorAll('[data-topdown-close]').forEach((button) => {
        button.addEventListener('click', () => setTopDown(button.dataset.topdownClose, false));
      });
    }

function updateRatingsFromRpcResult(result, winnerGroup, loserGroup) {
  if (!result) return;

  const winner = app.ratings[winnerGroup.groupId];
  const loser = app.ratings[loserGroup.groupId];

  if (winner) {
    winner.rating = Number(result.winner_rating) || winner.rating;
    winner.comparisons = Number(result.winner_votes_count) || winner.comparisons;
  }

  if (loser) {
    loser.rating = Number(result.loser_rating) || loser.rating;
    loser.comparisons = Number(result.loser_votes_count) || loser.comparisons;
  }
}

    function animateIntoView(direction) {
      const incomingClass = direction === 'left' ? 'enter-right' : 'enter-left';
      leftCard.classList.remove('swipe-left', 'swipe-right', 'is-chosen', 'is-dimmed');
      rightCard.classList.remove('swipe-left', 'swipe-right', 'is-chosen', 'is-dimmed');
      leftCard.classList.add(incomingClass);
      rightCard.classList.add(incomingClass);

      requestAnimationFrame(() => {
        leftCard.classList.add('enter-reset');
        rightCard.classList.add('enter-reset');
        leftCard.classList.remove(incomingClass);
        rightCard.classList.remove(incomingClass);
        setTimeout(() => {
          leftCard.classList.remove('enter-reset');
          rightCard.classList.remove('enter-reset');
          app.isAnimating = false;
        }, 440);
      });
    }
async function applyVoteToSupabase({ leftGroupId, rightGroupId, chosenGroupId }) {
  if (!hasAnonKey() || !app.voter.sessionId) {
    throw new Error('No valid Supabase voting session found.');
  }

  const payload = {
    p_session_id: app.voter.sessionId,
    p_voter_type: app.voter.voterType,
    p_teacher_name: app.voter.voterType === 'teacher' ? app.voter.displayName : null,
    p_student_id: app.voter.voterType === 'student' ? Number(app.voter.studentId || app.voter.voterId) : null,
    p_left_groupid: leftGroupId,
    p_right_groupid: rightGroupId,
    p_chosen_groupid: chosenGroupId
  };

  const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/thp_apply_vote`, {
    method: 'POST',
    headers: supabaseHeaders('return=representation'),
    body: JSON.stringify(payload)
  });

  const text = await response.text();
  if (!response.ok) {
    throw new Error(`Vote apply failed: ${text}`);
  }

  return text ? JSON.parse(text) : null;
}

function castVote(side) {
  if (app.isAnimating || app.progress.completed) return;

  const winnerGroup = side === 'left' ? app.currentPair.left : app.currentPair.right;
  const loserGroup = side === 'left' ? app.currentPair.right : app.currentPair.left;
  const swipeClass = side === 'left' ? 'swipe-left' : 'swipe-right';

  app.isAnimating = true;
  vsBadge.classList.add('vs-pulse');
  setTimeout(() => vsBadge.classList.remove('vs-pulse'), 620);

  voteFlash.classList.remove('active');
  void voteFlash.offsetWidth;
  voteFlash.classList.add('active');

  if (side === 'left') {
    leftCard.classList.add('is-chosen');
    rightCard.classList.add('is-dimmed');
  } else {
    rightCard.classList.add('is-chosen');
    leftCard.classList.add('is-dimmed');
  }

  battleStage.classList.add('is-animating');
  leftCard.classList.add(swipeClass);
  rightCard.classList.add(swipeClass);

  const savePromise = applyVoteToSupabase({
    leftGroupId: app.currentPair.left.groupId,
    rightGroupId: app.currentPair.right.groupId,
    chosenGroupId: winnerGroup.groupId
  }).then((result) => {
    if (result) {
      app.progress.votesUsed = Number(result.votes_used) || app.progress.votesUsed;
      app.progress.maxVotes = Number(result.max_votes) || app.progress.maxVotes;
      app.progress.completed = Boolean(result.completed);
      updateRatingsFromRpcResult(result, winnerGroup, loserGroup);
      persistProgress();
    }
    return result;
  }).catch(async (error) => {
    console.error('Vote save failed.', error);
    alert(error.message || 'Vote save failed.');
    app.progress = await loadProgress(app.voter);
    app.ratings = await loadRatings(app.voter);
    persistProgress();
    app.isAnimating = false;
    battleStage.classList.remove('is-animating');
    leftCard.classList.remove('swipe-left', 'swipe-right', 'is-chosen', 'is-dimmed');
    rightCard.classList.remove('swipe-left', 'swipe-right', 'is-chosen', 'is-dimmed');
    return null;
  });

  setTimeout(async () => {
    battleStage.classList.remove('is-animating');
    app.carousel.left = { index: 0, manual: false, total: 1 };
    app.carousel.right = { index: 0, manual: false, total: 1 };

    const result = await savePromise;
    if (!result) return;

    if (app.progress.completed) {
      completionOverlay.classList.add('is-visible');
      app.isAnimating = false;
      app.nextPair = null;
      app.nextPairReady = false;
      app.preloadPromise = null;
      return;
    }

    const queuedPair = app.nextPair || chooseQueuedPair(app.currentPair);
    app.currentPair = queuedPair;
    app.nextPair = null;
    app.nextPairReady = false;

    await renderPair(app.currentPair);
    animateIntoView(side);
    queueNextPair();
  }, 620);
}

    function tickAutoCarousel() {
      if (app.isAnimating || app.progress.completed) return;
      ['left', 'right'].forEach((side) => {
        if (!app.carousel[side].manual) moveCarousel(side, 1, false);
      });
    }

async function init() {
  app.voter = loadVoter();
  app.ratings = await loadRatings(app.voter);
  app.progress = await loadProgress(app.voter);
  syncProgressUI();

  if (playableGroups.length < 2) {
    throw new Error('Upload at least two groups before opening the collection page.');
  }

  if (app.progress.completed || app.progress.votesUsed >= app.progress.maxVotes) {
    app.progress.completed = true;
    persistProgress();
    completionOverlay.classList.add('is-visible');
    hideBootOverlay();
    return;
  }

  app.currentPair = choosePair();
  const initialQueuedPair = chooseQueuedPair(app.currentPair);

  await preloadInitialPairWithProgress(app.currentPair);
  queueNextPair(initialQueuedPair);

  await renderPair(app.currentPair);

  setTimeout(() => {
    hideBootOverlay();
  }, 180);
}

    completionLeaderboardButton.addEventListener('click', () => {
      window.location.href = 'leaderboard.html';
    });

    setInterval(tickAutoCarousel, 3600);
    init().catch((error) => {
      console.error('Collection page failed to initialize.', error);
      leftCard.innerHTML = loadingCardMarkup();
      rightCard.innerHTML = loadingCardMarkup();
    });
  </script>
